[build]
  command = "bun run build"
  publish = "dist"

# Proxy server-side routes back to Lovable Cloud (where the TanStack server
# functions and /api/chat actually run). This keeps the browser on a single
# origin, so cookies/auth headers work and there's no CORS to configure.
[[redirects]]
  from = "/api/*"
  to = "https://focalens.lovable.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/_serverFn/*"
  to = "https://focalens.lovable.app/_serverFn/:splat"
  status = 200
  force = true

# SPA fallback for client-side routing (TanStack Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
