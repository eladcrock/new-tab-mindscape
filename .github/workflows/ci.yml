name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
        env:
          # Public, safe-to-commit Supabase publishable values used at build time.
          # These mirror what's already in .env so PR builds succeed.
          VITE_SUPABASE_URL: https://rgrfmkhatmqzgflnguhh.supabase.co
